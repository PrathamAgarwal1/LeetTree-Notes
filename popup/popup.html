<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetTree Notes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="popup-logo">
        <img src="../icons/icon32.png" alt="LeetTree" width="24" height="24">
        <h1>LeetTree Notes</h1>
      </div>
      <span class="popup-version">v1.0</span>
    </header>

    <div class="popup-stats" id="stats-section">
      <div class="stat-card">
        <span class="stat-number" id="stat-problems">0</span>
        <span class="stat-label">Problems</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="stat-solutions">0</span>
        <span class="stat-label">Solutions</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="stat-starred">0</span>
        <span class="stat-label">Starred</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="stat-revision">0</span>
        <span class="stat-label">Revision</span>
      </div>
    </div>

    <div class="popup-actions">
      <button class="popup-btn popup-btn--primary" id="btn-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Open Dashboard
      </button>
      <button class="popup-btn popup-btn--secondary" id="btn-save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Current Problem
      </button>
    </div>

    <div class="popup-footer">
      <span id="folder-count">0 folders</span>
      <a href="#" id="btn-help" class="popup-link">Help</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
